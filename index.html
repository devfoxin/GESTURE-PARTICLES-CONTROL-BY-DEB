<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Hand Particle System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Hidden webcam video element used for MediaPipe tracking */
        #webcam {
            transform: scaleX(-1);
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            z-index: 10;
            object-fit: cover;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: #00ffcc; }
        .stat { margin: 5px 0; font-size: 0.9rem; }
        .highlight { color: #ff00ff; font-weight: bold; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <video id="webcam" autoplay playsinline></video>

    <div id="ui-overlay">
        <h1>Gesture Particle Engine</h1>
        <div class="stat">Active Shape: <span id="current-shape" class="highlight">Saturn</span></div>
        <div class="stat">Hand Distance (Expansion): <span id="hand-expansion" class="highlight">0.0</span></div>
        <div class="stat">Hand Position (Rotation): <span id="hand-rotation" class="highlight">X: 0, Y: 0</span></div>
        <div style="margin-top: 15px; font-size: 0.8rem; color: #aaa;">
            • Hold up 1 finger: <span style="color: #fff">Saturn</span><br>
            • Hold up 2 fingers: <span style="color: #fff">Heart</span><br>
            • Hold up 3 fingers: <span style="color: #fff">Flower</span><br>
            • Hold up 4 fingers: <span style="color: #fff">Fireworks</span>
        </div>
    </div>

    <script>
        // --- 1. GLOBAL SETTINGS & STATE ---
        const PARTICLE_COUNT = 15000;
        let scene, camera, renderer, particleGeometry, particleSystem;
        let targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        let velocities = new Float32Array(PARTICLE_COUNT * 3);
        let colors = new Float32Array(PARTICLE_COUNT * 3);
        
        let currentShapeIndex = 0; // 0: Saturn, 1: Heart, 2: Flower, 3: Fireworks
        const shapes = ['Saturn', 'Heart', 'Flower', 'Fireworks'];
        
        // Interactive control metrics driven by hand gestures
        let globalExpansion = 1.0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        let baseColor = new THREE.Color(0x00ffcc);

        // --- 2. GENERATE SHAPE TEMPLATES (MATH FORMULAS) ---
        
        // Shape 0: Saturn (A central sphere with a wide flat ring system)
        function getSaturnPosition(i, target) {
            if (i < PARTICLE_COUNT * 0.4) { // Central Planet Sphere
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                const r = 1.5 + Math.random() * 0.2;
                target[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                target[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                target[i * 3 + 2] = r * Math.cos(phi);
            } else { // The Ring System
                const theta = Math.random() * Math.PI * 2;
                const r = 2.5 + Math.random() * 2.5;
                target[i * 3] = r * Math.cos(theta);
                target[i * 3 + 1] = (Math.random() - 0.5) * 0.15; // Flattened Y axis
                target[i * 3 + 2] = r * Math.sin(theta);
            }
        }

        // Shape 1: Heart Shape (Using 3D Mathematical Heart Formula)
        function getHeartPosition(i, target) {
            const t = Math.PI * (2 * Math.random() - 1);
            const phi = Math.PI * (Math.random() - 0.5);
            
            // Parametric equations for a heart shape
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            const z = phi * 5; // give it 3D depth
            
            // Scale it down to match scene dimensions
            target[i * 3] = x * 0.2;
            target[i * 3 + 1] = y * 0.2;
            target[i * 3 + 2] = z * 0.2;
        }

        // Shape 2: Mathematical Flower (Rose Curve / Phyllotaxis Spiral combo)
        function getFlowerPosition(i, target) {
            const phi = i * 137.5 * (Math.PI / 180); // Golden angle
            const r = Math.sqrt(i) / Math.sqrt(PARTICLE_COUNT) * 4;
            const petals = 6;
            
            // Add wave modulation to create layered petals
            const zMod = Math.sin(phi * petals) * 0.8 * r;
            
            target[i * 3] = r * Math.cos(phi);
            target[i * 3 + 1] = zMod;
            target[i * 3 + 2] = r * Math.sin(phi);
        }

        // Shape 3: Fireworks (Explosive streaks projecting from center)
        function getFireworksPosition(i, target) {
            // Assign particles randomly to discrete "streaks"
            const totalStreaks = 60;
            const streakId = i % totalStreaks;
            
            const theta = (streakId / totalStreaks) * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            // Random distance along the burst vector
            const speed = 2.0 + Math.random() * 4.0; 
            
            target[i * 3] = speed * Math.sin(phi) * Math.cos(theta);
            target[i * 3 + 1] = speed * Math.sin(phi) * Math.sin(theta);
            target[i * 3 + 2] = speed * Math.cos(phi);
        }

        // Master function to trigger transition smoothly
        function transitionToShape(shapeIndex) {
            currentShapeIndex = shapeIndex;
            document.getElementById('current-shape').innerText = shapes[shapeIndex];
            
            const tempTargets = new Float32Array(PARTICLE_COUNT * 3);
            
            for(let i = 0; i < PARTICLE_COUNT; i++) {
                if(shapeIndex === 0) getSaturnPosition(i, tempTargets);
                else if(shapeIndex === 1) getHeartPosition(i, tempTargets);
                else if(shapeIndex === 2) getFlowerPosition(i, tempTargets);
                else if(shapeIndex === 3) getFireworksPosition(i, tempTargets);
                
                // Calculate directional velocities toward the new template positions
                velocities[i*3] = (tempTargets[i*3] - targetPositions[i*3]) * 0.05;
                velocities[i*3+1] = (tempTargets[i*3+1] - targetPositions[i*3+1]) * 0.05;
                velocities[i*3+2] = (tempTargets[i*3+2] - targetPositions[i*3+2]) * 0.05;
                
                targetPositions[i*3] = tempTargets[i*3];
                targetPositions[i*3+1] = tempTargets[i*3+1];
                targetPositions[i*3+2] = tempTargets[i*3+2];
            }
        }

        // --- 3. INITIALIZE THREE.JS GRAPHICS ---
        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.05);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Create initial raw particles
            particleGeometry = new THREE.BufferGeometry();
            const initialPositions = new Float32Array(PARTICLE_COUNT * 3);

            for(let i=0; i<PARTICLE_COUNT * 3; i++) {
                initialPositions[i] = (Math.random() - 0.5) * 20;
                targetPositions[i] = initialPositions[i];
                colors[i] = Math.random();
            }

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(initialPositions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // Custom glowing particle texture via HTML Canvas
            const pCanvas = document.createElement('canvas');
            pCanvas.width = 16; pCanvas.height = 16;
            const ctx = pCanvas.getContext('2d');
            const grad = ctx.createRadialGradient(8,8,0, 8,8,8);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,16,16);
            const pTexture = new THREE.CanvasTexture(pCanvas);

            const particleMaterial = new THREE.PointsMaterial({
                size: 0.08,
                map: pTexture,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true
            });

            particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);

            // Setup default starting shape
            transitionToShape(0);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 4. MEDIAPIPE HAND TRACKING & GESTURE LOGIC ---
        const videoElement = document.getElementById('webcam');
        
        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0]; // Process dominant hand

                // 1. DYNAMIC COLOR CONTROL (Map wrist position to color hues)
                const wrist = hand[0];
                baseColor.setHSL(wrist.x, 1.0, 0.5);

                // 2. ROTATION CONTROL (Map hand average coordinates to target mesh rotation)
                targetRotationY = (wrist.x - 0.5) * 4.0;
                targetRotationX = (wrist.y - 0.5) * 4.0;
                document.getElementById('hand-rotation').innerText = `X: ${targetRotationX.toFixed(1)}, Y: ${targetRotationY.toFixed(1)}`;

                // 3. EXPANSION CONTROL (Distance between Thumb Tip [4] and Pinky Tip [20])
                const thumbTip = hand[4];
                const pinkyTip = hand[20];
                const dist = Math.sqrt(
                    Math.pow(thumbTip.x - pinkyTip.x, 2) + 
                    Math.pow(thumbTip.y - pinkyTip.y, 2) + 
                    Math.pow(thumbTip.z - pinkyTip.z, 2)
                );
                // Normalize and upscale structural expansion mapping
                globalExpansion = THREE.MathUtils.lerp(globalExpansion, 0.3 + dist * 5.0, 0.1);
                document.getElementById('hand-expansion').innerText = globalExpansion.toFixed(2);

                // 4. GESTURE / TEMPLATE SWITCHING (Count Extended Fingers)
                // Finger tips: Index(8), Middle(12), Ring(16), Pinky(20)
                // Associated Knuckles: Index(6), Middle(10), Ring(14), Pinky(18)
                let extendedFingers = 0;
                if (hand[8].y < hand[6].y) extendedFingers++;
                if (hand[12].y < hand[10].y) extendedFingers++;
                if (hand[16].y < hand[14].y) extendedFingers++;
                if (hand[20].y < hand[18].y) extendedFingers++;

                // Prevent zero-finger conditions from breaking layout state
                if (extendedFingers >= 1 && extendedFingers <= 4) {
                    const targetShape = extendedFingers - 1;
                    if(targetShape !== currentShapeIndex) {
                        transitionToShape(targetShape);
                    }
                }
            }
        }

        // Initializing MediaPipe Hands Instance
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(onHandResults);

        // Instantiating Video Stream Feed
        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraFeed.start();

        // --- 5. RENDER LOOP (ANIMATION & PHYSICS MIGRATION) ---
        function animate() {
            requestAnimationFrame(animate);

            const positions = particleGeometry.attributes.position.array;
            const colorAttribute = particleGeometry.attributes.color.array;

            // Ease system rotation smoothly toward computed hand movements
            particleSystem.rotation.y += (targetRotationY - particleSystem.rotation.y) * 0.05;
            particleSystem.rotation.x += (targetRotationX - particleSystem.rotation.x) * 0.05;

            // Continual passive system drift
            particleSystem.rotation.y += 0.002;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;

                // Physics: Smoothly Lerp current position toward (target shape position * expansion factor)
                const currentTargetX = targetPositions[i3] * globalExpansion;
                const currentTargetY = targetPositions[i3 + 1] * globalExpansion;
                const currentTargetZ = targetPositions[i3 + 2] * globalExpansion;

                positions[i3] += (currentTargetX - positions[i3]) * 0.08;
                positions[i3 + 1] += (currentTargetY - positions[i3 + 1]) * 0.08;
                positions[i3 + 2] += (currentTargetZ - positions[i3 + 2]) * 0.08;

                // Dynamic Color Interpolation per particle
                // Blend a unique mix between base color and a shifting individual parameter spectrum
                const pColor = baseColor.clone();
                if(currentShapeIndex === 3) { 
                    // Give fireworks an explicitly randomized festive splash profile
                    pColor.offsetHSL(i % 10 * 0.1, 0, 0); 
                } else {
                    pColor.offsetHSL((positions[i3] * 0.03), 0, 0);
                }
                
                colorAttribute[i3] = pColor.r;
                colorAttribute[i3 + 1] = pColor.g;
                colorAttribute[i3 + 2] = pColor.b;
            }

            particleGeometry.attributes.position.needsUpdate = true;
            particleGeometry.attributes.color.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // Bootstrapping Core Logic Runtime
        initThree();
        animate();
    </script>
</body>
</html>
