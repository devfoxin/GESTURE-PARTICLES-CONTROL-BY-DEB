<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced 3D Hand Particle System v3</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #webcam {
            transform: scaleX(-1);
            position: absolute;
            top: 15px;
            right: 15px;
            width: 120px;
            height: 90px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            object-fit: cover;
            background: #111;
        }
        
        #ui-overlay {
            position: absolute;
            color: white;
            z-index: 10;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        h1 { margin: 0 0 8px 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; color: #00ffcc; }
        .stat { margin: 4px 0; font-size: 0.85rem; color: #ccc; }
        .highlight { color: #ff00ff; font-weight: bold; }
        
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 12px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }

        #drawer-toggle {
            display: none;
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: none;
            color: #00ffcc;
            padding: 6px 20px;
            border-radius: 8px 8px 0 0;
            font-size: 0.8rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        @media (min-width: 769px) {
            #ui-overlay {
                top: 15px;
                left: 15px;
                width: 300px;
                padding: 20px;
                border-radius: 12px;
            }
        }

        @media (max-width: 768px) {
            #webcam {
                width: 90px;
                height: 68px;
                top: 10px;
                right: 10px;
            }
            #ui-overlay {
                bottom: 0;
                left: 0;
                width: 100vw;
                box-sizing: border-box;
                padding: 15px 20px 25px 20px;
                border-radius: 16px 16px 0 0;
                border-left: none;
                border-right: none;
                border-bottom: none;
                transform: translateY(0);
            }
            #ui-overlay.collapsed {
                transform: translateY(calc(100% - 40px));
            }
            #drawer-toggle {
                display: block;
            }
            .menu-grid {
                grid-template-columns: 1fr;
                gap: 4px;
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <video id="webcam" autoplay playsinline></video>

    <div id="ui-overlay">
        <button id="drawer-toggle" onclick="toggleDrawer()">▲ Controls</button>
        <h1>Gesture Engine v3</h1>
        <div class="stat">Shape: <span id="current-shape" class="highlight">Saturn</span></div>
        <div class="stat">Scale: <span id="hand-expansion" class="highlight">1.0</span></div>
        <div class="stat">Rotation: <span id="hand-rotation" class="highlight">X: 0, Y: 0</span></div>
        
        <div class="menu-grid">
            <div>1 Finger: <span style="color: #fff">Saturn</span></div>
            <div>2 Fingers: <span style="color: #fff">Heart</span></div>
            <div>3 Fingers: <span style="color: #fff">Flower</span></div>
            <div>4 Fingers: <span style="color: #fff">Fireworks</span></div>
            <div>5 Fingers: <span style="color: #fff">Infinity Loop</span></div>
            <div>Thumb + Pinky: <span style="color: #fff">DNA Helix</span></div>
            <div>Fist: <span style="color: #fff">Tornado</span></div>
            <div>Middle Finger: <span style="color: #fff">Text</span></div> </div>
    </div>

    <script>
        // --- 1. HARDWARE-TARGETED PERFORMANCE TUNING ---
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768;
        
        // Increased for text resolution, but still optimized. Text uses about 4k points minimum.
        const PARTICLE_COUNT = isMobile ? 8000 : 22000; 

        let scene, camera, renderer, particleGeometry, particleSystem;
        let targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        let velocities = new Float32Array(PARTICLE_COUNT * 3);
        let colors = new Float32Array(PARTICLE_COUNT * 3);
        
        let currentShapeIndex = 0;
        const shapes = ['Saturn', 'Heart', 'Flower', 'Fireworks', 'Infinity Loop', 'DNA Helix', 'Tornado', 'Same to You']; // Added New Shape
        
        let globalExpansion = 1.0;
        let targetRotationX = 0, targetRotationY = 0;
        let baseColor = new THREE.Color(0x00ffcc);

        function toggleDrawer() {
            const overlay = document.getElementById('ui-overlay');
            const btn = document.getElementById('drawer-toggle');
            overlay.classList.toggle('collapsed');
            if(overlay.classList.contains('collapsed')) {
                btn.innerText = "▲ Controls";
            } else {
                btn.innerText = "▼ Hide";
            }
        }

        // --- 2. GENERATION ALGORITHMS ---
        // Basic shapes optimized for responsive count.
        function getSaturnPosition(i, target) {
            if (i < PARTICLE_COUNT * 0.4) {
                const u = Math.random(), v = Math.random();
                const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
                const r = 1.4 + Math.random() * 0.2;
                target[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                target[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                target[i * 3 + 2] = r * Math.cos(phi);
            } else {
                const theta = Math.random() * Math.PI * 2;
                const r = 2.2 + Math.random() * 2.2;
                target[i * 3] = r * Math.cos(theta);
                target[i * 3 + 1] = (Math.random() - 0.5) * 0.12;
                target[i * 3 + 2] = r * Math.sin(theta);
            }
        }

        function getHeartPosition(i, target) {
            const t = Math.PI * (2 * Math.random() - 1);
            const phi = Math.PI * (Math.random() - 0.5);
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            target[i * 3] = x * 0.18; target[i * 3 + 1] = y * 0.18; target[i * 3 + 2] = phi * 0.8;
        }

        function getFlowerPosition(i, target) {
            const phi = i * 137.5 * (Math.PI / 180);
            const r = Math.sqrt(i) / Math.sqrt(PARTICLE_COUNT) * 3.8;
            target[i * 3] = r * Math.cos(phi); target[i * 3 + 1] = Math.sin(phi * 6) * 0.6 * r; target[i * 3 + 2] = r * Math.sin(phi);
        }

        function getFireworksPosition(i, target) {
            const totalStreaks = isMobile ? 40 : 100;
            const streakId = i % totalStreaks;
            const theta = (streakId / totalStreaks) * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            const speed = 1.8 + Math.random() * 4.5; 
            target[i * 3] = speed * Math.sin(phi) * Math.cos(theta);
            target[i * 3 + 1] = speed * Math.sin(phi) * Math.sin(theta);
            target[i * 3 + 2] = speed * Math.cos(phi);
        }

        function getInfinityPosition(i, target) {
            const t = (i / PARTICLE_COUNT) * Math.PI * 2 * 15;
            const scale = 4.0;
            target[i * 3] = scale * Math.sin(t);
            target[i * 3 + 1] = scale * Math.sin(t) * Math.cos(t);
            target[i * 3 + 2] = (Math.random() - 0.5) * 1.0 + Math.cos(t) * 0.4;
        }

        function getDNAPosition(i, target) {
            const strand = i % 2;
            const t = (i / PARTICLE_COUNT) * Math.PI * 10;
            const radius = 1.8;
            const pitch = 0.3;
            if (i % 12 === 0) {
                const linkPercent = Math.random();
                const angle = t + (strand * Math.PI);
                target[i * 3] = THREE.MathUtils.lerp(radius * Math.cos(angle), radius * Math.cos(angle + Math.PI), linkPercent);
                target[i * 3 + 1] = (t * pitch) - 4.0;
                target[i * 3 + 2] = THREE.MathUtils.lerp(radius * Math.sin(angle), radius * Math.sin(angle + Math.PI), linkPercent);
            } else {
                const angle = t + (strand * Math.PI);
                target[i * 3] = radius * Math.cos(angle) + (Math.random() - 0.5) * 0.15;
                target[i * 3 + 1] = (t * pitch) - 4.0;
                target[i * 3 + 2] = radius * Math.sin(angle) + (Math.random() - 0.5) * 0.15;
            }
        }

        function getTornadoPosition(i, target) {
            const height = (i / PARTICLE_COUNT) * 8.0;
            const radius = (height * 0.45) + 0.15; 
            const angle = height * 4.5 + (Math.random() * Math.PI);
            target[i * 3] = radius * Math.cos(angle);
            target[i * 3 + 1] = height - 4.0;
            target[i * 3 + 2] = radius * Math.sin(angle);
        }

        // --- NEW TEXT SHAPE: Same to You ---
        let textPoints = null; // Will cache text sample points

        function generateTextPoints() {
            if(textPoints) return; // Prevent recreation

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 256; // Landscape area for text

            // Render text onto hidden canvas
            ctx.fillStyle = 'white';
            ctx.font = 'bold 80px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('SAME', canvas.width/2, 60);
            ctx.fillText('TO', canvas.width/2, 128);
            ctx.fillText('YOU', canvas.width/2, 196);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const sampled = [];

            // Scan canvas and create point data
            for (let y = 0; y < canvas.height; y += 3) { // Step is quality/performance trade-off
                for (let x = 0; x < canvas.width; x += 3) {
                    const index = (y * canvas.width + x) * 4;
                    if (imageData.data[index] > 128) { // If pixel is white
                        sampled.push({
                            x: (x - canvas.width / 2) * 0.045, // Scale to Three.js space
                            y: (canvas.height / 2 - y) * 0.045,
                            z: (Math.random() - 0.5) * 0.2 // Slight depth variance
                        });
                    }
                }
            }
            textPoints = sampled;
        }

        function getTextPosition(i, target) {
            generateTextPoints(); // Ensure text is sampled
            const pointCount = textPoints.length;
            
            // Map particles to text points, looping if necessary
            const p = textPoints[i % pointCount];
            target[i * 3] = p.x;
            target[i * 3 + 1] = p.y;
            target[i * 3 + 2] = p.z;
        }

        // --- Master Transition Controller ---
        function transitionToShape(shapeIndex) {
            currentShapeIndex = shapeIndex;
            document.getElementById('current-shape').innerText = shapes[shapeIndex];
            const tempTargets = new Float32Array(PARTICLE_COUNT * 3);
            
            for(let i = 0; i < PARTICLE_COUNT; i++) {
                if(shapeIndex === 0) getSaturnPosition(i, tempTargets);
                else if(shapeIndex === 1) getHeartPosition(i, tempTargets);
                else if(shapeIndex === 2) getFlowerPosition(i, tempTargets);
                else if(shapeIndex === 3) getFireworksPosition(i, tempTargets);
                else if(shapeIndex === 4) getInfinityPosition(i, tempTargets);
                else if(shapeIndex === 5) getDNAPosition(i, tempTargets);
                else if(shapeIndex === 6) getTornadoPosition(i, tempTargets);
                else if(shapeIndex === 7) getTextPosition(i, tempTargets); // New Text Shape
                
                targetPositions[i*3] = tempTargets[i*3];
                targetPositions[i*3+1] = tempTargets[i*3+1];
                targetPositions[i*3+2] = tempTargets[i*3+2];
            }
        }

        // --- 3. THREE.JS INITIALIZATION ---
        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.05);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = isMobile ? 16 : 12; // Pull camera back for wider view

            renderer = new THREE.WebGLRenderer({ antialias: !isMobile, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            particleGeometry = new THREE.BufferGeometry();
            const initialPositions = new Float32Array(PARTICLE_COUNT * 3);
            for(let i=0; i<PARTICLE_COUNT * 3; i++) {
                initialPositions[i] = (Math.random() - 0.5) * 20;
                targetPositions[i] = initialPositions[i];
                colors[i] = Math.random();
            }
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(initialPositions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const pCanvas = document.createElement('canvas');
            pCanvas.width = 16; pCanvas.height = 16;
            const ctx = pCanvas.getContext('2d');
            const grad = ctx.createRadialGradient(8,8,0, 8,8,8);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,16,16);
            
            const particleMaterial = new THREE.PointsMaterial({
                size: isMobile ? 0.12 : 0.07, // Balanced particle size
                map: new THREE.CanvasTexture(pCanvas),
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true
            });

            particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);

            // Pre-cache text points for faster switching
            generateTextPoints();

            transitionToShape(0);
            window.addEventListener('resize', onWindowResize);
            
            if(isMobile) setTimeout(toggleDrawer, 1500);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 4. GESTURE TRACKING PIPELINE (UPDATED FOR MIDDLE FINGER) ---
        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const wrist = hand[0];
                
                baseColor.setHSL(wrist.x, 0.9, 0.5);
                targetRotationY = (wrist.x - 0.5) * 4.0;
                targetRotationX = (wrist.y - 0.5) * 4.0;
                document.getElementById('hand-rotation').innerText = `X: ${targetRotationX.toFixed(1)}, Y: ${targetRotationY.toFixed(1)}`;

                const dist = Math.sqrt(Math.pow(hand[4].x - hand[20].x, 2) + Math.pow(hand[4].y - hand[20].y, 2));
                globalExpansion = THREE.MathUtils.lerp(globalExpansion, 0.4 + dist * 4.5, 0.15);
                document.getElementById('hand-expansion').innerText = globalExpansion.toFixed(2);

                const isThumbUp = hand[4].x > hand[3].x; // Simple thumb check
                const isIndexUp = hand[8].y < hand[6].y;
                const isMiddleUp = hand[12].y < hand[10].y;
                const isRingUp = hand[16].y < hand[14].y;
                const isPinkyUp = hand[20].y < hand[18].y;

                let extendedCount = 0;
                if (isIndexUp) extendedCount++;
                if (isMiddleUp) extendedCount++;
                if (isRingUp) extendedCount++;
                if (isPinkyUp) extendedCount++;

                let detectedShape = currentShapeIndex;

                // --- GESTURE DICTIONARY UPDATE ---
                
                // Specific Gesture: Middle Finger Check
                if(isMiddleUp && !isIndexUp && !isRingUp && !isPinkyUp) {
                    detectedShape = 7; // Text Shape
                } else if (extendedCount === 0) {
                    detectedShape = 6; // Fist
                } else if (extendedCount === 1) {
                    detectedShape = 0; // 1 Finger
                } else if (extendedCount === 2) {
                    detectedShape = 1; // 2 Fingers
                } else if (extendedCount === 3) {
                    detectedShape = 2; // 3 Fingers
                } else if (extendedCount === 4 && !isThumbUp) {
                    detectedShape = 3; // 4 Fingers
                } else if (extendedCount === 4 && isThumbUp) {
                    detectedShape = 4; // 5 Fingers
                }
                
                // Shortcut Specific Gesture: DNA Helix
                if (isPinkyUp && isThumbUp && !isIndexUp && !isMiddleUp) {
                    detectedShape = 5;
                }

                if (detectedShape !== currentShapeIndex) transitionToShape(detectedShape);
            }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: isMobile ? 0 : 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onHandResults);

        const videoElement = document.getElementById('webcam');
        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: isMobile ? 320 : 640,
            height: isMobile ? 240 : 480
        });
        cameraFeed.start();

        // --- 5. LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const positions = particleGeometry.attributes.position.array;
            const colorAttribute = particleGeometry.attributes.color.array;

            particleSystem.rotation.y += (targetRotationY - particleSystem.rotation.y) * 0.05;
            particleSystem.rotation.x += (targetRotationX - particleSystem.rotation.x) * 0.05;
            
            // Spinning rules based on shape
            if(currentShapeIndex === 6) particleSystem.rotation.y += 0.04; // Tornado spin
            else if(currentShapeIndex === 7) {} // Text stays steady
            else particleSystem.rotation.y += 0.003; // Default spin

            const interpolationSpeed = isMobile ? 0.12 : 0.07; // Snappier rendering for few points

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const tx = targetPositions[i3] * globalExpansion;
                const ty = targetPositions[i3 + 1] * globalExpansion;
                const tz = targetPositions[i3 + 2] * globalExpansion;

                positions[i3] += (tx - positions[i3]) * interpolationSpeed;
                positions[i3 + 1] += (ty - positions[i3 + 1]) * interpolationSpeed;
                positions[i3 + 2] += (tz - positions[i3 + 2]) * interpolationSpeed;

                // Color Rules
                const pColor = baseColor.clone();
                if (currentShapeIndex === 5) { // DNA Helix
                    pColor.offsetHSL((i % 2 === 0 ? 0.3 : 0.7), 0, 0);
                } else if(currentShapeIndex === 3) { // Fireworks
                    pColor.offsetHSL((i % 12 * 0.08), 0, 0);
                } else if(currentShapeIndex === 7) { // Text
                    // Give text a subtle vertical gradient shift
                    pColor.offsetHSL(positions[i3 + 1] * 0.015, 0, 0);
                } else {
                    pColor.offsetHSL((positions[i3] * 0.02), 0, 0);
                }
                
                colorAttribute[i3] = pColor.r;
                colorAttribute[i3 + 1] = pColor.g;
                colorAttribute[i3 + 2] = pColor.b;
            }

            particleGeometry.attributes.position.needsUpdate = true;
            particleGeometry.attributes.color.needsUpdate = true;
            renderer.render(scene, camera);
        }

        initThree();
        animate();
    </script>
</body>
</html>
